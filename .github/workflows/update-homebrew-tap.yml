name: Update Homebrew Tap

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout flip
        uses: actions/checkout@v4
        with:
          path: flip

      - name: Render formula
        working-directory: flip
        run: |
          scripts/build_formula.sh --tag "$GITHUB_REF_NAME" --output "$RUNNER_TEMP/flip.rb"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ffy6511/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cp "$RUNNER_TEMP/flip.rb" homebrew-tap/Formula/flip.rb

      - name: Commit and push tap update
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/flip.rb; then
            echo "Formula/flip.rb is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/flip.rb
          git commit -m "flip $GITHUB_REF_NAME"
          git push
